name: Release Check

on:
  pull_request:
    branches: [main]

jobs:
  check-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release readiness
        run: bash scripts/check-release.sh "origin/${{ github.base_ref }}"
