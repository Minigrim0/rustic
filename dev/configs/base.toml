# Base configuration — all defaults.
# Experiment configs override only the values that differ.

[run]
mlflow_uri = "http://192.168.1.254:5000"
experiment = "Default"
model = "NoteWaveformPredictor"

[data]
data_dir = "./data/datasets"
n_samples = 80_000
batch_size_gen = 1_000
val_split = 0.1

[training]
batch_size = 64
n_epochs = 80
lr = 1e-3
seed = 42
lambda_waveform = 1.0
